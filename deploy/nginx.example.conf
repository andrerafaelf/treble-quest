# Maps the Upgrade request header to the Connection value nginx must send upstream.
# Required for the multiplayer WebSocket at api.treble.quest/vs/ws.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Main site
server {
    listen 80;
    listen [::]:80;
    server_name treble.quest www.treble.quest;

    root /var/www/treble-quest;
    index index.html;

    location /r/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # SPA HTML shell must never be cached at CDN level — content changes on deploy
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Versioned static assets are safe to cache forever — filenames change on rebuild
    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|avif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}

# API subdomain
server {
    listen 80;
    listen [::]:80;
    server_name api.treble.quest;

    # WebSocket endpoint for multiplayer lobbies — needs the upgrade headers
    # and a long read timeout so idle sockets aren't dropped.
    location /vs/ws {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
