name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install site deps
        run: npm install

      - name: Typecheck site
        run: npm run check

      - name: Build site
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.PUBLIC_GOOGLE_SITE_VERIFICATION }}
          PUBLIC_GA_MEASUREMENT_ID: ${{ vars.PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Install server deps
        working-directory: server
        run: npm install

      - name: Typecheck server
        working-directory: server
        run: npx tsc --noEmit

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          tar -czf artifacts/site.tar.gz -C build .
          cp -r src/lib server/src/lib
          tar -czf artifacts/server.tar.gz \
            --exclude='server/node_modules' \
            --exclude='server/data' \
            server
          rm -rf server/src/lib

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: deploy-bundle
          path: artifacts/
          retention-days: 7

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-bundle
          path: artifacts

      - name: Upload bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'artifacts/site.tar.gz,artifacts/server.tar.gz'
          target: '/tmp/treble-quest-deploy'
          strip_components: 1

      - name: Install on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR=/opt/treble-quest
            SITE_DIR=/var/www/treble-quest
            BUNDLE_DIR=/tmp/treble-quest-deploy

            sudo mkdir -p "$APP_DIR/server" "$SITE_DIR"

            STAGING="$SITE_DIR.next"
            sudo rm -rf "$STAGING"
            sudo mkdir -p "$STAGING"
            sudo tar -xzf "$BUNDLE_DIR/site.tar.gz" -C "$STAGING"
            sudo rsync -a --delete "$STAGING/" "$SITE_DIR/"
            sudo rm -rf "$STAGING"

            sudo tar -xzf "$BUNDLE_DIR/server.tar.gz" -C "$APP_DIR/server" --strip-components=1
            sudo chown -R trebleq:trebleq "$APP_DIR"

            sudo -u trebleq bash -c "cd $APP_DIR/server && npm install --omit=dev"

            sudo tee /etc/treble-quest.env > /dev/null <<ENVEOF
            NODE_ENV=production
            PORT=8787
            HOST=127.0.0.1
            DB_PATH=$APP_DIR/server/data/leaderboard.db
            ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}
            SITE_URL=${{ vars.PUBLIC_SITE_URL }}
            IP_SALT=${{ secrets.IP_SALT }}
            ENVEOF
            sudo chmod 0640 /etc/treble-quest.env
            sudo chown root:trebleq /etc/treble-quest.env

            sudo cp "$APP_DIR/server/deploy/treble-quest-api.service" /etc/systemd/system/treble-quest-api.service
            sudo systemctl daemon-reload
            sudo systemctl enable treble-quest-api
            sudo systemctl restart treble-quest-api

            for i in $(seq 1 12); do
              if curl -fsS http://127.0.0.1:8787/health > /dev/null; then
                echo "[deploy] API service healthy"
                break
              fi
              echo "[deploy] attempt $i: API not ready"
              sleep 2
              if [ "$i" -eq 12 ]; then
                echo "[deploy] FATAL: API failed health check"
                sudo journalctl -u treble-quest-api --no-pager -n 50
                exit 1
              fi
            done

            if ! sudo nginx -t 2>/dev/null; then
              echo "[deploy] repairing stale Docker upstreams in nginx.conf"
              sudo cp /etc/nginx/nginx.conf "/etc/nginx/nginx.conf.bak.$(date +%F-%H%M%S)"
              sudo sed -i -E 's/server[[:space:]]+[a-z][-a-z]*:([0-9]+);/server 127.0.0.1:\1;/g' /etc/nginx/nginx.conf
              if ! sudo nginx -t; then
                echo "[deploy] FATAL: nginx config still invalid after upstream repair"
                sudo nginx -t 2>&1 || true
                exit 1
              fi
            fi

            # Deploy /r/ proxy snippet for share result pages
            printf '    location /r/ {\n        proxy_pass http://127.0.0.1:8787;\n        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_read_timeout 10s;\n    }\n' | sudo tee /etc/nginx/treble-quest-share.conf > /dev/null
            if ! sudo grep -q 'treble-quest-share.conf' /etc/nginx/nginx.conf; then
              echo "[deploy] adding include for /r/ proxy in nginx config"
              sudo sed -i '/server_name.*treble\.quest/a\    include /etc/nginx/treble-quest-share.conf;' /etc/nginx/nginx.conf
              if ! sudo nginx -t; then
                echo "[deploy] WARNING: include injection failed, removing"
                sudo sed -i '/treble-quest-share.conf/d' /etc/nginx/nginx.conf
              fi
            fi

            sudo systemctl enable nginx || true
            if sudo nginx -s reload 2>/dev/null; then
              echo "[deploy] nginx reloaded"
            else
              echo "[deploy] nginx reload failed — attempting restart"
              sudo systemctl restart nginx 2>/dev/null || sudo systemctl start nginx 2>/dev/null || {
                echo "[deploy] WARNING: nginx failed to start"
                sudo journalctl -xeu nginx.service --no-pager -n 30 || true
                sudo ss -tlnp | grep -E ':80|:443' || true
                echo "[deploy] continuing — API is healthy on localhost"
              }
            fi

            for i in $(seq 1 6); do
              if curl -fsS --connect-timeout 5 --max-time 10 https://api.treble.quest/health > /dev/null; then
                echo "[deploy] public API healthy"
                break
              fi
              echo "[deploy] attempt $i: public API not reachable"
              sleep 3
              if [ "$i" -eq 6 ]; then
                echo "[deploy] WARNING: public API not reachable via nginx (API is healthy on localhost)"
                sudo systemctl status nginx --no-pager || true
                sudo journalctl -u nginx --no-pager -n 30 || true
                echo "[deploy] deploy succeeded — nginx proxy may need manual attention on shared VPS"
              fi
            done

            rm -rf "$BUNDLE_DIR"
            echo "[deploy] done"
